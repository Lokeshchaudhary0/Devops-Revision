apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: helm-aks-demo
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/<USERNAME>/<REPO>.git
    targetRevision: main
    path: Helm/Kubernetes-Infra
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: default
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
